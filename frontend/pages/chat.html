<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat | UniLance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/typography.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/animations.css">
    <link rel="stylesheet" href="../css/layout.css">
    <script>
      (() => {
        const saved = localStorage.getItem("ul-theme");
        const system = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        document.documentElement.setAttribute("data-theme", saved || system);
      })();
    </script>
  </head>
  <body>
    <div id="navbarMount"></div>
    <main id="app" class="chat-page">
      <div class="chat-layout">
        <aside class="chat-sidebar">
          <div class="chat-header">
            <div>
              <h3>Messages</h3>
              <p class="muted" style="font-size:0.84rem">Recent client and seller conversations</p>
            </div>
            <button class="btn-icon" type="button">+</button>
          </div>
          <div id="conversationList"></div>
        </aside>

        <section class="chat-window">
          <div class="chat-header">
            <div id="chatRecipient">
              <strong>Select a conversation</strong>
              <div class="muted" style="font-size:0.84rem">Messages update live while you work.</div>
            </div>
            <div class="inline-actions">
              <button class="btn-icon" type="button">📎</button>
              <button class="btn-icon" type="button">😀</button>
            </div>
          </div>
          <div class="chat-messages" id="chatMessages"></div>
          <div class="typing-indicator" id="typingIndicator">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <span class="muted" id="typingName">Someone is typing...</span>
          </div>
          <form class="chat-composer" id="chatComposer">
            <button class="btn-icon" type="button">📎</button>
            <button class="btn-icon" type="button">😀</button>
            <input class="composer-input" id="msgInput" type="text" placeholder="Write a message...">
            <button class="btn btn-primary" type="submit">Send</button>
          </form>
        </section>
      </div>
    </main>
    <div id="bottomNavMount"></div>
    <script type="module" src="../js/pages/chat.js"></script>
  </body>
</html>
