<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | UniLance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/typography.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/animations.css">
    <link rel="stylesheet" href="../css/layout.css">
    <script>
      (() => {
        const saved = localStorage.getItem("ul-theme");
        const system = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        document.documentElement.setAttribute("data-theme", saved || system);
      })();
    </script>
  </head>
  <body>
    <div id="navbarMount"></div>
    <main id="app" class="page-shell page-content">
      <section class="profile-page">
        <div class="container">
          <section class="profile-hero" id="profileHero">
            <div class="profile-hero__top">
              <div class="profile-hero__identity" id="profileIdentity"></div>
              <div class="inline-actions">
                <a class="btn btn-secondary" href="chat.html">Message</a>
                <button class="btn btn-primary" type="button" id="editProfileBtn">Edit Profile</button>
              </div>
            </div>
            <div class="profile-hero__stats" id="profileStats"></div>
          </section>

          <div class="profile-grid">
            <aside class="profile-sidebar">
              <section class="profile-card">
                <h3>Skills</h3>
                <div class="skill-cloud" id="profileSkills" style="margin-top:16px"></div>
              </section>

              <section class="profile-card">
                <h3>Quick facts</h3>
                <div class="quick-list" id="profileFacts" style="margin-top:16px"></div>
              </section>

              <form class="profile-card auth-stack" id="editProfileForm">
                <div>
                  <h3>Edit public profile</h3>
                  <p class="muted">Update your public-facing details.</p>
                </div>
                <label class="form-group">
                  <input class="form-input" id="editName" type="text" placeholder=" ">
                  <span class="form-label">Full name</span>
                </label>
                <label class="form-group">
                  <input class="form-input" id="editUniversity" type="text" placeholder=" ">
                  <span class="form-label">University</span>
                </label>
                <label class="form-group">
                  <input class="form-input" id="editSkills" type="text" placeholder=" ">
                  <span class="form-label">Skills (comma separated)</span>
                </label>
                <label class="form-group">
                  <textarea class="form-input" id="editBio" placeholder=" "></textarea>
                  <span class="form-label">Bio</span>
                </label>
                <button class="btn btn-primary btn-block" type="submit">Save Changes</button>
              </form>
            </aside>

            <section style="display:grid;gap:24px">
              <article class="profile-card">
                <h3>About</h3>
                <p id="profileBio" style="margin-top:12px">Loading student profile...</p>
              </article>

              <article class="profile-card">
                <div class="section-head" style="margin-bottom:20px">
                  <div>
                    <span class="eyebrow">Portfolio gigs</span>
                    <h2 style="margin-top:12px">Listings and standout work</h2>
                  </div>
                </div>
                <div class="seller-gig-grid" id="profileGigGrid"></div>
              </article>
            </section>
          </div>
        </div>
      </section>
    </main>
    <div id="footerMount"></div>
    <div id="bottomNavMount"></div>
    <script type="module" src="../js/pages/profile.js"></script>
  </body>
</html>
