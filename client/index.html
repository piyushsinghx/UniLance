<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UniLance — Student Freelance Marketplace</title>
  <meta name="description" content="The premier freelance marketplace built exclusively for university students. Hire talent, build projects, grow skills." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%236366F1'/><text x='50%25' y='55%25' dominant-baseline='central' text-anchor='middle' fill='white' font-size='18' font-weight='bold'>U</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- Navbar -->
  <nav id="navbar"></nav>

  <!-- Main content area — SPA pages render here -->
  <main id="app"></main>

  <!-- Footer -->
  <footer id="footer-root"></footer>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <!-- Loader overlay -->
  <div id="page-loader" class="page-loader hidden">
    <div class="loader-content">
      <div class="loader-icon">
        <div class="loader-spinner"></div>
      </div>
      <p class="loader-text">Loading...</p>
    </div>
  </div>

  <!-- Socket.IO (optional, loaded from server) -->
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js" defer></script>

  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/components.js"></script>
  <script src="js/pages.js"></script>
  <script src="js/pages2.js"></script>
  <script src="js/router.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
